<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Learn-GPT — RAG-powered intelligent learning assistant. Upload PDFs and chat with an AI grounded in your study material." />
  <title>Learn-GPT — Your AI Learning Assistant</title>
  <link rel="icon" href="/static/images/LOGO.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>

<body>

  <!-- ── Toast container ──────────────────────────────────────── -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ── App shell ────────────────────────────────────────────── -->
  <div id="app">

    <!-- ══ Sidebar ════════════════════════════════════════════ -->
    <aside id="sidebar" role="navigation" aria-label="Chat sessions">

      <div id="sidebar-header">
        <!-- Wordmark logo -->
        <div id="sidebar-logo" aria-hidden="true">
          <img
            src="/static/images/LOGO.png"
            alt="Learn-GPT"
            class="sidebar-logo-img"
          />
        </div>
        <span id="sidebar-title">Learn-GPT</span>
      </div>

      <button id="new-chat-btn" title="Start a new conversation" aria-label="New chat">
        <!-- Plus icon -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        New Chat
      </button>

      <div id="sessions-label" aria-label="Previous chats">Recent</div>

      <div id="sessions-list" role="listbox" aria-label="Chat history">
        <!-- Populated by app.js -->
      </div>

    </aside><!-- /sidebar -->

    <!-- ══ Main ═══════════════════════════════════════════════ -->
    <main id="main" role="main">

      <!-- Top bar -->
      <header id="topbar">
        <div id="topbar-session" aria-label="Current session">
          <span class="status-dot" aria-hidden="true"></span>
          Session: <span id="topbar-session-id">—</span>
        </div>
        <div id="health-badge" aria-live="polite" title="Backend health status">Checking…</div>
      </header>

      <!-- Chat window -->
      <section id="chat-window" role="log" aria-label="Chat messages" aria-live="polite">

        <!-- Welcome / empty state -->
        <div id="welcome-screen" aria-label="Welcome">
          <div class="welcome-icon" aria-hidden="true">
            <!-- Graduation cap / book SVG — no emoji -->
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
            </svg>
          </div>
          <h1>Welcome to Learn-GPT</h1>
          <p>Ask anything, or upload a PDF to get grounded, context-aware answers powered by Llama 3 and RAG.</p>

          <div class="welcome-hints" role="list">
            <button class="hint-chip" role="listitem"
              onclick="useHint('Explain the key concepts in my uploaded document.')"
              aria-label="Use hint: Explain key concepts">
              Explain key concepts
            </button>
            <button class="hint-chip" role="listitem"
              onclick="useHint('Summarize the main points of my study material.')"
              aria-label="Use hint: Summarize main points">
              Summarize main points
            </button>
            <button class="hint-chip" role="listitem" onclick="useHint('Create 5 quiz questions from my PDF.')"
              aria-label="Use hint: Create quiz questions">
              Create quiz questions
            </button>
            <button class="hint-chip" role="listitem"
              onclick="useHint('What are the most important definitions I should know?')"
              aria-label="Use hint: Important definitions">
              Important definitions
            </button>
          </div>
        </div>
        <!-- Messages injected here by app.js -->

      </section><!-- /chat-window -->

      <!-- Input section -->
      <footer id="input-section" aria-label="Message input">

        <div id="input-wrapper">

          <!-- PDF upload button -->
          <button class="input-btn" id="upload-btn" title="Upload a PDF document" aria-label="Upload PDF">
            <!-- Paperclip icon -->
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48" />
            </svg>
          </button>
          <input type="file" id="pdf-file-input" accept=".pdf" aria-label="Select PDF file" />

          <!-- Text input -->
          <textarea id="message-input" rows="1" placeholder="Ask a question… (Shift+Enter for new line)"
            aria-label="Message input" autocomplete="off" spellcheck="true"></textarea>

          <!-- Mic button -->
          <button class="input-btn" id="mic-btn" title="Voice input" aria-label="Start voice input">
            <!-- Mic icon -->
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
          </button>

          <!-- Send button -->
          <button id="send-btn" title="Send message" aria-label="Send message">
            <!-- Arrow icon -->
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>

        </div>

        <div id="input-footer">
          Learn-GPT &middot; Llama 3 via Ollama &middot; RAG with ChromaDB &middot;
          <kbd>Enter</kbd> to send &nbsp;&middot;&nbsp; <kbd>Shift+Enter</kbd> for new line
        </div>

      </footer><!-- /input-section -->

    </main><!-- /main -->

  </div><!-- /#app -->

  <script src="/static/js/app.js"></script>
</body>

</html>
